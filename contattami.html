    <section id="contatti" class="container mb-4 p-4">
    <h2 class="text-center mb-4">Contattami</h2>

    <form action="#" method="post" class="row g-3 mt-4 p-4 mx-3 shadow rounded-4 bordo-arancio">

        <div class="col-md-6 mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" placeholder="Nome" required>
        </div>

        <div class="col-md-6 mb-3">
            <label for="cognome" class="form-label">Cognome</label>
            <input type="text" id="cognome" name="cognome" class="form-control" placeholder="Cognome" required>
        </div>

        <div class="col-12 mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="col-12 mb-3">
            <label for="messaggio" class="form-label">Messaggio</label>
            <textarea id="messaggio" name="messaggio" class="form-control" rows="5" placeholder="Scrivi il tuo messaggio..." required></textarea>
        </div>

        <div class="col-12 text-center submit-btn mb-3">
            <button type="submit" class="btn btn-primary px-4">Invia</button>
        </div>

    </form>
</section>
